<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Culprit</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>
<div class = "main-wrap">
    <div class = "paper-layer"></div>

    <div class = "start-screen">
            <h1>The Culprit</h1>
            <p class = "small-text">
                someone in the group is hiding something...
            </p>
            <div class="btns-holder">
                <button id = "startBtn">
                    Start Game
                </button>

                <button id = "helpBtn">
                    How to play?
                </button>
            </div>
    </div>

    <div class = "setup-screen">
        <h2>Game Setup</h2>
        <div class = "setup-box">
            <label>Crew Name</label>
            <input type="text" id="crewInput" placeholder="Friday Night Crew">
        </div>

        <div class = "setup-box">
            <label>Number of Players</label>
            <div class="player-count-holder">
                <button class="count-btn">4</button>
                <button class="count-btn">5</button>
                <button class="count-btn">6</button>
                <button class="count-btn">7</button>
                <button class="count-btn">8</button>
            </div>
        </div>

        <div class = "setup-actions">
            <button id = "backBtn">
                Back
            </button>

            <button id = "continueBtn">
                Continue
            </button>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
